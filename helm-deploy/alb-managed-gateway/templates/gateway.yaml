{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.alb.infrastructureNamespace }}
  annotations:
    alb.networking.azure.io/alb-namespace: {{ .Values.alb.infrastructureNamespace }}
    alb.networking.azure.io/alb-name: {{ .Values.alb.name }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: {{ .Values.gateway.listener.name }}
      protocol: {{ .Values.gateway.listener.protocol }}
      port: {{ .Values.gateway.listener.port }}
      {{- with .Values.gateway.listener.hostname }}
      hostname: {{ . | quote }}
      {{- end }}
      allowedRoutes:
        namespaces:
          from: {{ .Values.gateway.allowedRoutes.namespacesFrom }}
{{- end }}
